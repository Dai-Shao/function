controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    # Joint names (order: FL, FR, RR, RL — matches mecanum kinematics)
    front_left_wheel_command_joint_name: front_left_wheel_joint
    front_right_wheel_command_joint_name: front_right_wheel_joint
    rear_right_wheel_command_joint_name: rear_right_wheel_joint
    rear_left_wheel_command_joint_name: rear_left_wheel_joint

    # Kinematics
    kinematics:
      wheels_radius: 0.04
      sum_of_robot_center_projection_on_X_Y_axis: 0.26  # lx(0.15) + ly(0.11)

    # Frame IDs
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

    # Twist stamped input
    use_twist_stamped: true

    # Linear X limits
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.has_jerk_limits: false
    linear.x.max_velocity: 0.5
    linear.x.min_velocity: -0.5
    linear.x.max_acceleration: 2.0
    linear.x.min_acceleration: -2.0

    # Linear Y limits (mecanum lateral!)
    linear.y.has_velocity_limits: true
    linear.y.has_acceleration_limits: true
    linear.y.has_jerk_limits: false
    linear.y.max_velocity: 0.5
    linear.y.min_velocity: -0.5
    linear.y.max_acceleration: 2.0
    linear.y.min_acceleration: -2.0

    # Angular Z limits
    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.has_jerk_limits: false
    angular.z.max_velocity: 2.0
    angular.z.min_velocity: -2.0
    angular.z.max_acceleration: 3.0
    angular.z.min_acceleration: -3.0

amcl:
  ros__parameters:
    use_sim_time: true
    robot_model_type: "nav2_amcl::OmniMotionModel"
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    initial_pose: {x: 0.0, y: 0.0, yaw: 0.0}
    save_pose_rate: 0.5
    laser_max_range: 10.0
    laser_min_range: 0.1
    laser_max_beams: 60
    min_rotational_vel: 0.1
    max_rotational_vel: 0.8
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    first_map_only: false
    set_initial_pose: false

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugin: "goal_checker"
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15

    # MPPI Controller — holonomic path following for mecanum
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.5
      vx_min: -0.5
      vy_max: 0.5
      vy_min: -0.5
      wz_max: 2.0
      iteration: 1
      prune_distance: 1.5
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: true
      reset_period: 1.0
      regenerate_noises: false

      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic",
                "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
                "PathAngleCritic", "PreferForwardCritic", "TwirlingCritic"]

      ConstraintCritic:
        enabled: true
        cost_weight: 4.0
      ObstaclesCritic:
        enabled: true
        cost_weight: 5.0
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false
      GoalCritic:
        enabled: true
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
      PathFollowCritic:
        enabled: true
        cost_weight: 5.0
        offset_from_furthest: 20
      PathAngleCritic:
        enabled: true
        cost_weight: 2.0
        offset_from_furthest: 4
      PreferForwardCritic:
        enabled: false
        cost_weight: 5.0
      TwirlingCritic:
        enabled: true
        cost_weight: 10.0

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugin_types: ["nav2_navfn_planner/NavfnPlanner"]
    planner_plugin_names: ["GridBased"]
    GridBased:
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap: local_costmap
    global_costmap: global_costmap
    loop_rate: 20
    action_server_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

local_costmap:
  ros__parameters:
    use_sim_time: true
    update_frequency: 5.0
    publish_frequency: 2.0
    global_frame: odom
    robot_base_frame: base_link
    rolling_window: true
    width: 4
    height: 4
    resolution: 0.05
    robot_radius: 0.25
    plugins: ["obstacle_layer", "inflation_layer"]
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      enabled: true
      inflation_radius: 0.40
      cost_scaling_factor: 3.0

global_costmap:
  ros__parameters:
    use_sim_time: true
    update_frequency: 1.0
    publish_frequency: 1.0
    global_frame: map
    robot_base_frame: base_link
    width: 20
    height: 20
    resolution: 0.05
    robot_radius: 0.25
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      enabled: true
      map_subscribe_transient_local: true
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      enabled: true
      inflation_radius: 0.40
      cost_scaling_factor: 3.0

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "/cmd_vel"
    cmd_vel_out_topic: "/cmd_vel"
    state_topic: "/collision_monitor_state"
    transform_tolerance: 0.1
    source_timeout: 0.2
    enabled: true
    polygons: ["Footprint"]
    Footprint:
      type: "polygon"
      points_string: "[-0.2,-0.15, -0.2,0.15, 0.2,0.15, 0.2,-0.15]"
      action_type: "approach"
      simulation_time_step: 0.1
      min_collision_time: 0.2
    observation_sources: ["scan"]
    scan:
      topic: "/scan"
      type: "scan"
      min_height: 0.0
      max_height: 2.0

docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 50.0
    dock_plugins: ["SimpleChargingDock"]
    SimpleChargingDock:
      plugin: "opennav_docking::SimpleChargingDock"

lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
